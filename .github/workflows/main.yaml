name: Build push docker image and update k8s manifest

on:
  push:
    tags:
      - 'production-*.*.*'

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Get source code
        uses: actions/checkout@v4

      - name: Extract version from tags
        id: extract_version
        run: |
          VERSION="${GITHUB_REF_NAME#production-}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Docker hub connection
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push the image
        uses: docker/build-push-action@v4
        with: 
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/plan-t:latest 
            ${{ secrets.DOCKER_HUB_USERNAME }}/plan-t:${{ steps.extract_version.outputs.version }}

      - name: Update k8s manifest
        run: |
          sed -i "s|image: ${{ secrets.DOCKER_HUB_USERNAME }}/plan-t:.*|image: ${{ secrets.DOCKER_HUB_USERNAME }}/plan-t:${{ steps.extract_version.outputs.version }}|g" k8s/api.yaml
          git config --global user.name "Github actions"
          git config --global user.email "actions@github.com"
          git fetch origin main
          git checkout main
          git add k8s/api.yaml
          git commit -m "chore: update image to ${{ steps.extract_version.outputs.version }}"
          git push origin main
