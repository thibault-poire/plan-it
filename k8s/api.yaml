apiVersion: apps/v1
kind: Deployment
metadata:
  name: plan-t-api-deployment
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: plan-t
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api
      app.kubernetes.io/component: server
      app.kubernetes.io/part-of: plan-t
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
        app.kubernetes.io/component: server
        app.kubernetes.io/part-of: plan-t
    spec:
      containers:
        - name: plan-t-api-container
          image: khaym/plan-t:0.1.0
          ports:
            - containerPort: 3000
          env:
            - name: MONGO_USER
              valueFrom:
                secretKeyRef:
                  name: mongodb-secrets
                  key: mongodb_api_user_name 
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-secrets
                  key: mongodb_api_user_password
            - name: MONGO_HOST
              value: mongodb
            - name: MONGO_PORT
              value: "27017"
      imagePullSecrets:
        - name: docker-hub-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: plan-t-api-service
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: plan-t
spec:
  selector:
    app.kubernetes.io/name: api
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: plan-t
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
